<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Post Studio render + rasterize harness</title>
</head>
<body>
<div id="mount"></div>
<script type="module">
  import { renderComposition } from '../render.js';
  import { rasterizeToPngBlob } from '../rasterize.js';
  import { ensureFontsLoaded } from '../fonts.js';
  ensureFontsLoaded();

  // Build a composition node on demand (Task 3 exercises renderComposition;
  // Task 2 needs any inline-styled node — renderComposition supplies one).
  window.__buildStage = function (comp) {
    const mount = document.getElementById('mount');
    mount.innerHTML = '';
    const stage = renderComposition(comp);
    mount.appendChild(stage);
    window.__stage = stage;
    return stage.outerHTML.length;
  };

  window.__rasterizeError = null;
  window.__rasterize = async function () {
    try {
      const blob = await rasterizeToPngBlob(window.__stage, 2);
      const buf = await blob.arrayBuffer();
      const bytes = new Uint8Array(buf);
      // return a base64 data URL the Python side can decode
      let bin = '';
      for (let i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
      return 'data:image/png;base64,' + btoa(bin);
    } catch (e) {
      window.__rasterizeError = String(e);
      throw e;
    }
  };

  window.__describe = function (comp) {
    const stage = window.__buildStage(comp) && window.__stage;
    return {
      size: [stage.offsetWidth, stage.offsetHeight],
      bg: stage.style.background || stage.style.backgroundImage || '',
      hasDivider: !!stage.querySelector('svg'),
      imgs: stage.querySelectorAll('img').length,
      badges: Array.from(stage.querySelectorAll('div'))
        .filter((d) => /^[0-9]+$/.test(d.textContent.trim()) && d.style.borderRadius === '50%')
        .map((d) => d.textContent.trim()),
      hasDoctor: stage.textContent.includes('DR.'),
    };
  };

  window.__fontLoaded = function (spec) {
    return !!(document.fonts && document.fonts.check(spec));
  };

  // Create hidden elements for each font and weight combination to trigger loading.
  const hiddenContainer = document.createElement('div');
  hiddenContainer.style.display = 'none';
  const specs = [
    { family: "'Playfair Display'", weight: '700' },
    { family: "'Manrope'", weight: '400' },
    { family: "'Manrope'", weight: '700' },
    { family: "'Manrope'", weight: '800' },
    { family: "'Cairo'", weight: '400' },
  ];
  specs.forEach(({family, weight}) => {
    const el = document.createElement('span');
    el.style.fontFamily = family;
    el.style.fontWeight = weight;
    el.textContent = 'Test';
    hiddenContainer.appendChild(el);
  });
  document.body.appendChild(hiddenContainer);

  // Wait for fonts to be ready, then signal that all hooks are registered.
  if (document.fonts && document.fonts.ready) {
    document.fonts.ready.then(() => {
      // Add a delay to ensure fonts are truly available for checking.
      // Some fonts may take additional time to load beyond document.fonts.ready.
      setTimeout(() => {
        window.__harnessReady = true;
      }, 500);
    });
  } else {
    window.__harnessReady = true;
  }
</script>
</body>
</html>
