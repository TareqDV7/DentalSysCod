# DentaCare cloud node.
# Deploy from this directory on the server:  docker compose up -d --build
services:
  app:
    build:
      context: ..
      dockerfile: cloud/Dockerfile
    restart: unless-stopped
    # The staff web portal is not served on the cloud node — init_database()
    # skips seeding an admin login row when CLINIC_CLOUD_MODE=1 — so no staff
    # password is configured here.
    volumes:
      - dentacare-data:/data      # per-clinic SQLite files + cloud_master.db
    expose:
      - "5000"                    # internal only — Caddy is the public entrypoint
    environment:
      # Ed25519 vendor-signed-serial gating for /api/clinics/register and the
      # /api/license/validate authority (A1 licensing overhaul — this replaces
      # the old HMAC CLINIC_SERIAL_SIGNING_KEY, which the app no longer reads).
      #
      # CLINIC_SERIAL_PUBLIC_KEY is the base64 Ed25519 PUBLIC key — NOT a secret
      # (the matching private seed never leaves the vendor machine). It is also
      # baked into the app, so an empty value here falls back to the baked key;
      # set it only to override. CLINIC_ADMIN_API_TOKEN gates the
      # /api/license/admin/revoke endpoint and IS a secret: unset → that
      # endpoint is closed (401 on every call). Supply both from the host's
      # `cloud/.env` (chmod 600, gitignored), e.g.:
      #     cloud/.env:
      #       CLINIC_SERIAL_PUBLIC_KEY=<base64 public key from serial_generator.py --genkey>
      #       CLINIC_ADMIN_API_TOKEN=<openssl rand -base64 32>
      #       CLINIC_REQUIRE_SIGNED_SERIAL=1   # default; set 0 only for a transitional unsigned rollout
      # See DEPLOY_CLOUD.md ("Signed serials" / "Revoking / suspending a serial").
      - CLINIC_SERIAL_PUBLIC_KEY=${CLINIC_SERIAL_PUBLIC_KEY:-}
      - CLINIC_ADMIN_API_TOKEN=${CLINIC_ADMIN_API_TOKEN:-}
      - CLINIC_REQUIRE_SIGNED_SERIAL=${CLINIC_REQUIRE_SIGNED_SERIAL:-1}
      # Per-IP rate limits. register has its own (low) anti-spam budget; the
      # routine license `validate` (and admin) calls have a SEPARATE, far higher
      # budget — a clinic's devices all share one NAT IP, so lumping their
      # periodic validate calls in with register tripped a spurious 429 on cloud
      # sync. Empty here → the app's sane code defaults (register 30 / validate
      # 240 per hour) apply; set a value in cloud/.env only to override.
      - CLINIC_REGISTER_RATE_LIMIT=${CLINIC_REGISTER_RATE_LIMIT:-}
      - CLINIC_VALIDATE_RATE_LIMIT=${CLINIC_VALIDATE_RATE_LIMIT:-}
      - CLINIC_REGISTER_RATE_WINDOW=${CLINIC_REGISTER_RATE_WINDOW:-}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - CLINIC_EMAIL_FROM=${CLINIC_EMAIL_FROM:-DentaCare <no-reply@dentacare.tech>}

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data          # ACME account + issued certificates
      - caddy-config:/config
    depends_on:
      - app

  # Standalone backup sidecar — snapshots cloud_master.db + every clinic_<id>.db
  # from the data volume (mounted READ-ONLY so it can never corrupt live data)
  # into the SEPARATE dentacare-backups volume. Runs independently of app/caddy.
  # See cloud/backup.py and DEPLOY_CLOUD.md ("Backups & restore").
  backup:
    image: python:3.12-slim
    restart: unless-stopped
    volumes:
      - dentacare-data:/data:ro       # live SQLite files — READ-ONLY
      - dentacare-backups:/backups     # rotating timestamped snapshots
      - ./backup.py:/app/backup.py:ro  # the stdlib-only backup script
    working_dir: /app
    environment:
      - CLINIC_DATA_DIR=/data
      - BACKUP_DIR=/backups
      - BACKUP_RETENTION_DAYS=${BACKUP_RETENTION_DAYS:-14}
      - BACKUP_MIN_KEEP=${BACKUP_MIN_KEEP:-7}
      - BACKUP_INTERVAL_HOURS=${BACKUP_INTERVAL_HOURS:-24}
      - BACKUP_GZIP=${BACKUP_GZIP:-1}
    command: ["python", "backup.py", "--loop"]

volumes:
  dentacare-data:
  dentacare-backups:
  caddy-data:
  caddy-config:
