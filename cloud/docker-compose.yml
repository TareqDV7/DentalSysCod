# DentaCare cloud node.
# Deploy from this directory on the server:  docker compose up -d --build
services:
  app:
    build:
      context: ..
      dockerfile: cloud/Dockerfile
    restart: unless-stopped
    # The staff web portal is not served on the cloud node — init_database()
    # skips seeding an admin login row when CLINIC_CLOUD_MODE=1 — so no staff
    # password is configured here.
    volumes:
      - dentacare-data:/data      # per-clinic SQLite files + cloud_master.db
    expose:
      - "5000"                    # internal only — Caddy is the public entrypoint
    environment:
      # HMAC-signed-serial gating for /api/clinics/register. Both vars default
      # to empty / off — set them in `cloud/.env` (gitignored) on the host to
      # turn on soft-launch (key set, REQUIRE=0) or enforcement (REQUIRE=1).
      #
      # NEVER commit a real key here. CLINIC_SERIAL_SIGNING_KEY is a SECRET
      # (base64 of the same HMAC key serial_generator.py signs with) and MUST
      # come from the host's `cloud/.env` or a secret manager, e.g.:
      #     cloud/.env  (chmod 600, gitignored):
      #       CLINIC_SERIAL_SIGNING_KEY=<base64-of-32-random-bytes>   # placeholder — supply the real key out of band
      #       CLINIC_REQUIRE_SIGNED_SERIAL=1                          # flip to 1 only once every local server forwards a signed offline_token
      # See DEPLOY_CLOUD.md ("Enabling signed-serial enforcement") for the flip procedure.
      - CLINIC_SERIAL_SIGNING_KEY=${CLINIC_SERIAL_SIGNING_KEY:-}
      - CLINIC_REQUIRE_SIGNED_SERIAL=${CLINIC_REQUIRE_SIGNED_SERIAL:-0}

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data          # ACME account + issued certificates
      - caddy-config:/config
    depends_on:
      - app

  # Standalone backup sidecar — snapshots cloud_master.db + every clinic_<id>.db
  # from the data volume (mounted READ-ONLY so it can never corrupt live data)
  # into the SEPARATE dentacare-backups volume. Runs independently of app/caddy.
  # See cloud/backup.py and DEPLOY_CLOUD.md ("Backups & restore").
  backup:
    image: python:3.12-slim
    restart: unless-stopped
    volumes:
      - dentacare-data:/data:ro       # live SQLite files — READ-ONLY
      - dentacare-backups:/backups     # rotating timestamped snapshots
      - ./backup.py:/app/backup.py:ro  # the stdlib-only backup script
    working_dir: /app
    environment:
      - CLINIC_DATA_DIR=/data
      - BACKUP_DIR=/backups
      - BACKUP_RETENTION_DAYS=${BACKUP_RETENTION_DAYS:-14}
      - BACKUP_MIN_KEEP=${BACKUP_MIN_KEEP:-7}
      - BACKUP_INTERVAL_HOURS=${BACKUP_INTERVAL_HOURS:-24}
      - BACKUP_GZIP=${BACKUP_GZIP:-1}
    command: ["python", "backup.py", "--loop"]

volumes:
  dentacare-data:
  dentacare-backups:
  caddy-data:
  caddy-config:
